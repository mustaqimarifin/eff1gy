schema: './src/graphql/typeDefs/index.ts'
scopes:
  AUTHENTICATED: '__Secure-next-auth.session-token'
rootTypeNames:
  query: Query
  mutation: Mutation
keyFields:
  types:
    Tag:
      - name
    User:
      - id
      - name
    PageInfo: []
    StackEdge: []
    BookmarkEdge: []
    QuestionEdge: []
    EmailSubscription: []
rules:
  - types:
      Query:
        - blog
        - case
        - cases
        - tags
        - blogs
        - stack
        - stacks
        - bookmark
        - comments
        - question
        - bookmarks
        - questions
    maxAge: 43200
    swr: 43200
    scope: AUTHENTICATED
  - types:
      Query:
        - viewer
    maxAge: 2592000
    swr: 2592000
    scope: AUTHENTICATED
originUrl: 'https://eff1gy.vercel.app/api/graphql'
